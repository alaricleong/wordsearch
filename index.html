<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WordPop Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #fdfcfd;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            touch-action: none;
            user-select: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .grid-container {
            display: grid;
            gap: 2px;
            background-color: #e2e8f0;
            border: 4px solid #f1f5f9;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .cell {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            border-radius: 6px;
            transition: transform 0.1s, background-color 0.2s;
            text-shadow: 0 1px 1px rgba(255,255,255,0.5);
        }

        .cell-bg-0 { background-color: #fff1f2; color: #be123c; }
        .cell-bg-1 { background-color: #f0fdf4; color: #15803d; }
        .cell-bg-2 { background-color: #eff6ff; color: #1d4ed8; }
        .cell-bg-3 { background-color: #fefce8; color: #a16207; }
        .cell-bg-4 { background-color: #faf5ff; color: #7e22ce; }

        .cell.highlighted {
            background-color: #6366f1 !important;
            color: white !important;
            border-radius: 50%;
            z-index: 10;
            transform: scale(1.1);
        }

        .cell.found {
            background-color: #4ade80 !important;
            color: white !important;
            text-shadow: none;
            animation: pop 0.3s ease-out;
        }

        .cell.hint {
            background-color: #f59e0b !important;
            color: white !important;
            z-index: 20;
            animation: pulse-hint 0.6s infinite alternate;
        }

        .cell.revealed-missed {
            background-color: #fb7185 !important;
            color: white !important;
            text-shadow: none;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes pulse-hint {
            from { transform: scale(1); box-shadow: 0 0 0px #f59e0b; }
            to { transform: scale(1.15); box-shadow: 0 0 10px #f59e0b; }
        }

        .word-pill {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 9999px;
            background: #ffffff;
            border: 2px solid #e2e8f0;
            font-weight: 800;
            color: #475569;
            display: inline-block;
            cursor: pointer;
        }

        .word-pill:active {
            transform: scale(0.95);
        }

        .word-found {
            background-color: #22c55e !important;
            color: white !important;
            border-color: #22c55e !important;
            text-decoration: line-through;
            text-decoration-thickness: 2px;
            opacity: 0.6;
            pointer-events: none;
        }

        .difficulty-btn {
            font-size: 0.6rem;
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 8px;
            transition: all 0.2s;
            letter-spacing: 0.05em;
        }

        .difficulty-btn.active {
            background-color: #6366f1;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
        }

        .difficulty-btn:not(.active) {
            background-color: #f1f5f9;
            color: #64748b;
        }

        #word-list-container {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 32px 32px 0 0;
            padding: 20px 16px;
            margin-top: 12px;
            box-shadow: 0 -10px 15px -3px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="max-w-sm mx-auto p-3">

    <div class="flex justify-between items-center mb-1 shrink-0">
        <h1 class="text-xl font-black text-slate-800 tracking-tighter">WORD<span class="text-indigo-600">POP</span></h1>
        <div class="flex gap-1 bg-slate-100 p-1 rounded-xl">
            <button onclick="setDifficulty('easy')" id="btn-easy" class="difficulty-btn active">EASY</button>
            <button onclick="setDifficulty('medium')" id="btn-medium" class="difficulty-btn">MED</button>
            <button onclick="setDifficulty('hard')" id="btn-hard" class="difficulty-btn">HARD</button>
        </div>
    </div>

    <div class="flex justify-end mb-2 shrink-0 pr-1">
        <button onclick="giveUp()" class="text-[10px] font-bold text-slate-400 hover:text-rose-500 transition-colors flex items-center gap-1 uppercase tracking-tighter">
            <span>🏳️</span> Give Up
        </button>
    </div>

    <div class="flex justify-between items-center px-1 mb-1 shrink-0">
        <div id="progress-text" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
            Found: 0 / 0
        </div>
        <div id="selection-preview" class="font-black text-indigo-600 text-sm tracking-widest uppercase truncate max-w-[150px]"></div>
    </div>

    <div class="relative shrink-0 mx-auto w-full">
        <div id="grid" class="grid-container"></div>
    </div>

    <div id="word-list-container">
        <div class="flex items-center gap-3 mb-3 px-2">
            <div class="h-[2px] flex-grow bg-slate-100"></div>
            <span id="words-left-count" class="text-[10px] font-black text-slate-400 tracking-widest uppercase">Initializing...</span>
            <div class="h-[2px] flex-grow bg-slate-100"></div>
        </div>
        <div class="text-[9px] text-center text-slate-300 font-bold mb-2 uppercase tracking-tight">Tap a word for a hint</div>
        <div id="word-list" class="flex flex-wrap gap-2 justify-center overflow-y-auto pb-10"></div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden flex items-center justify-center z-50 p-6">
        <div class="bg-white rounded-[40px] p-8 w-full max-w-[300px] text-center shadow-2xl transform transition-all scale-100">
            <div id="modal-icon" class="text-6xl mb-4">🏆</div>
            <h2 id="modal-title" class="text-2xl font-black text-slate-800 mb-1">AMAZING!</h2>
            <p id="modal-text" class="text-slate-500 text-sm mb-6">You found every single word.</p>
            
            <div class="flex flex-col gap-3">
                <button id="share-btn" class="w-full bg-emerald-500 text-white font-black py-4 rounded-2xl shadow-lg shadow-emerald-100 active:scale-95 transition-all flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                    SHARE TO WHATSAPP
                </button>
                <button id="next-level-btn" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-indigo-100 active:scale-95 transition-all">
                    NEXT PUZZLE
                </button>
            </div>
        </div>
    </div>

    <script>
        const WORD_BANKS = {
            easy: ["CAT", "DOG", "SUN", "FISH", "BIRD", "TREE", "BOX", "STAR", "MILK", "CAKE", "FROG", "DUCK", "MOON", "BOOK", "LAMP", "SNOW", "RAIN", "FIRE", "SHIP", "LEAF", "BALL", "KITE", "SOCK", "JUMP", "BLUE", "RED", "GOLD", "WIND", "BOWL", "HAT", "CUP", "ROAD", "CITY", "PARK"],
            medium: ["ORANGE", "BANANA", "CHERRY", "GRAPES", "LEMON", "APPLE", "PEACH", "MELON", "WINTER", "SUMMER", "SPRING", "AUTUMN", "ROCKET", "PLANET", "SILVER", "GOLDEN", "BRIGHT", "GENTLE", "FLOWER", "GARDEN", "SCHOOL", "COFFEE", "TURTLE", "RABBIT", "BRIDGE", "CLOUDS", "STREET", "DREAMS", "GUITAR", "MUSEUM", "WINDOW", "BOTTLE", "BREEZE", "DESERT", "ISLAND"],
            hard: ["GALAXY", "QUASAR", "NEBULA", "COMET", "PLANET", "ORBIT", "ROCKET", "STAR", "SPACE", "MOON", "DIAMOND", "CRYSTAL", "PYRAMID", "VOLCANO", "PHANTOM", "THUNDER", "WHISPER", "JOURNEY", "MYSTERY", "KINGDOM", "ANCIENT", "BRAVERY", "FREEDOM", "HARMONY", "ECLIPSE", "HORIZON", "INFINITY", "MAJESTY", "PHOENIX", "STARLIGHT", "TRIUMPH", "UNIVERSE", "VICTORY", "WONDER", "ZEPHYR"]
        };

        const CONFIG = {
            easy: { size: 8, wordCount: 8 },
            medium: { size: 10, wordCount: 10 },
            hard: { size: 12, wordCount: 12 }
        };

        let difficulty = 'easy';
        let gridSize = 8;
        let words = [];
        let wordPlacements = []; 
        let grid = [];
        let foundWords = new Set();
        let isSelecting = false;
        let startCell = null;
        let endCell = null;
        let hintTimeout = null;

        const gridElement = document.getElementById('grid');
        const wordListElement = document.getElementById('word-list');
        const selectionPreview = document.getElementById('selection-preview');
        const progressText = document.getElementById('progress-text');
        const leftCountText = document.getElementById('words-left-count');
        const modal = document.getElementById('modal');

        function setDifficulty(level) {
            difficulty = level;
            gridSize = CONFIG[level].size;
            ['easy', 'medium', 'hard'].forEach(l => {
                document.getElementById(`btn-${l}`)?.classList.toggle('active', l === level);
            });
            initGame();
        }

        function initGame() {
            const fullBank = WORD_BANKS[difficulty];
            const count = CONFIG[difficulty].wordCount;
            words = [...fullBank].sort(() => Math.random() - 0.5).slice(0, count);
            
            foundWords.clear();
            wordPlacements = [];
            grid = Array(gridSize).fill(null).map(() => Array(gridSize).fill(''));
            modal.classList.add('hidden');
            
            generateGrid();
            renderGrid();
            renderWordList();
            updateUI();
        }

        function generateGrid() {
            // Sort words longest first to make placement easier
            const sortedWords = [...words].sort((a, b) => b.length - a.length);
            let placedCount = 0;

            sortedWords.forEach(word => {
                let placed = false;
                let attempts = 0;
                // Increased max attempts and refined randomization
                while (!placed && attempts < 1000) {
                    const dirIdx = Math.floor(Math.random() * 3); // 0: Horiz, 1: Vert, 2: Diag
                    const r = Math.floor(Math.random() * gridSize);
                    const col = Math.floor(Math.random() * gridSize);
                    
                    if (canPlace(word, r, col, dirIdx)) {
                        const coords = place(word, r, col, dirIdx);
                        wordPlacements.push({ word, coords });
                        placed = true;
                        placedCount++;
                    }
                    attempts++;
                }
                
                // If a word absolutely failed to place, we force a restart of generation 
                // to guarantee the user always sees a complete list.
                if (!placed) {
                    grid = Array(gridSize).fill(null).map(() => Array(gridSize).fill(''));
                    wordPlacements = [];
                    generateGrid(); 
                    return; 
                }
            });

            // Fill empty spaces with random letters
            const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (grid[r][c] === '') {
                        grid[r][c] = alpha[Math.floor(Math.random() * alpha.length)];
                    }
                }
            }
        }

        function canPlace(word, r, c, dir) {
            if (dir === 0 && c + word.length > gridSize) return false;
            if (dir === 1 && r + word.length > gridSize) return false;
            if (dir === 2 && (r + word.length > gridSize || c + word.length > gridSize)) return false;
            
            for (let i = 0; i < word.length; i++) {
                let currR = r, currC = c;
                if (dir === 0) currC += i;
                else if (dir === 1) currR += i;
                else if (dir === 2) { currR += i; currC += i; }
                if (grid[currR][currC] !== '' && grid[currR][currC] !== word[i]) return false;
            }
            return true;
        }

        function place(word, r, c, dir) {
            const coords = [];
            for (let i = 0; i < word.length; i++) {
                let currR = r, currC = c;
                if (dir === 0) currC += i;
                else if (dir === 1) currR += i;
                else if (dir === 2) { currR += i; currC += i; }
                grid[currR][currC] = word[i];
                coords.push({r: currR, c: currC});
            }
            return coords;
        }

        function renderGrid() {
            gridElement.innerHTML = '';
            gridElement.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            const fontSize = gridSize <= 8 ? '1rem' : gridSize <= 10 ? '0.85rem' : '0.7rem';
            
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const cell = document.createElement('div');
                    const colorIdx = (r + c) % 5;
                    cell.className = `cell cell-bg-${colorIdx}`;
                    cell.style.fontSize = fontSize;
                    cell.textContent = grid[r][c];
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    
                    cell.addEventListener('mousedown', startSel);
                    cell.addEventListener('touchstart', startSel, {passive: false});
                    cell.addEventListener('mouseenter', moveSel);
                    cell.addEventListener('touchmove', touchMoveSel, {passive: false});
                    
                    gridElement.appendChild(cell);
                }
            }
        }

        function renderWordList() {
            wordListElement.innerHTML = '';
            words.forEach(word => {
                const div = document.createElement('div');
                div.className = 'word-pill';
                div.id = `pill-${word}`;
                div.textContent = word;
                div.onclick = () => showHint(word);
                wordListElement.appendChild(div);
            });
        }

        function showHint(word) {
            if (foundWords.has(word)) return;
            
            // Clear existing hints
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('hint'));
            if (hintTimeout) clearTimeout(hintTimeout);

            const placement = wordPlacements.find(p => p.word === word);
            if (placement) {
                placement.coords.forEach(coord => {
                    const cell = document.querySelector(`[data-row="${coord.r}"][data-col="${coord.c}"]`);
                    if (cell) cell.classList.add('hint');
                });

                hintTimeout = setTimeout(() => {
                    document.querySelectorAll('.cell').forEach(c => c.classList.remove('hint'));
                }, 2000);
            }
        }

        function updateUI() {
            const count = foundWords.size;
            const total = words.length;
            progressText.textContent = `Found: ${count} / ${total}`;
            const left = total - count;
            leftCountText.textContent = left === 0 ? "All Found!" : `${left} Words Left`;
        }

        function startSel(e) {
            if (modal.offsetParent !== null) return;
            e.preventDefault();
            const cell = e.target.closest('.cell');
            if (!cell) return;
            isSelecting = true;
            startCell = { r: parseInt(cell.dataset.row), c: parseInt(cell.dataset.col) };
            updateSel(startCell);
        }

        function touchMoveSel(e) {
            if (!isSelecting) return;
            e.preventDefault();
            const touch = e.touches[0];
            const cell = document.elementFromPoint(touch.clientX, touch.clientY)?.closest('.cell');
            if (cell) updateSel({ r: parseInt(cell.dataset.row), c: parseInt(cell.dataset.col) });
        }

        function moveSel(e) {
            if (isSelecting) {
                const cell = e.target.closest('.cell');
                if (cell) updateSel({ r: parseInt(cell.dataset.row), c: parseInt(cell.dataset.col) });
            }
        }

        function updateSel(pos) {
            let dr = pos.r - startCell.r;
            let dc = pos.c - startCell.c;
            if (dr !== 0 && dc !== 0 && Math.abs(dr) !== Math.abs(dc)) return;
            
            endCell = pos;
            const word = getSelWord();
            selectionPreview.textContent = word;
            
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('highlighted'));
            const steps = Math.max(Math.abs(endCell.r - startCell.r), Math.abs(endCell.c - startCell.c));
            const sr = Math.sign(endCell.r - startCell.r || 0);
            const sc = Math.sign(endCell.c - startCell.c || 0);

            for (let i = 0; i <= steps; i++) {
                const r = startCell.r + i * sr;
                const c = startCell.c + i * sc;
                const cell = document.querySelector(`[data-row="${r}"][data-col="${c}"]`);
                if(cell) cell.classList.add('highlighted');
            }
        }

        function getSelWord() {
            if (!startCell || !endCell) return "";
            let word = "";
            const steps = Math.max(Math.abs(endCell.r - startCell.r), Math.abs(endCell.c - startCell.c));
            const sr = Math.sign(endCell.r - startCell.r || 0);
            const sc = Math.sign(endCell.c - startCell.c || 0);
            for (let i = 0; i <= steps; i++) {
                const r = startCell.r + i * sr;
                const c = startCell.c + i * sc;
                if (r >= 0 && r < gridSize && c >= 0 && c < gridSize) {
                    word += grid[r][c];
                }
            }
            return word;
        }

        function handleEnd() {
            if (!isSelecting) return;
            const word = getSelWord();
            const rev = word.split('').reverse().join('');

            if (words.includes(word) && !foundWords.has(word)) mark(word);
            else if (words.includes(rev) && !foundWords.has(rev)) mark(rev);

            isSelecting = false;
            startCell = endCell = null;
            selectionPreview.textContent = "";
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('highlighted'));
            updateUI();
            if (foundWords.size === words.length) showWin(true);
        }

        function mark(word) {
            foundWords.add(word);
            document.getElementById(`pill-${word}`)?.classList.add('word-found');
            
            const placement = wordPlacements.find(p => p.word === word);
            if (placement) {
                placement.coords.forEach(coord => {
                    const cell = document.querySelector(`[data-row="${coord.r}"][data-col="${coord.c}"]`);
                    if (cell) cell.classList.add('found');
                });
            }
        }

        function giveUp() {
            wordPlacements.forEach(p => {
                if (!foundWords.has(p.word)) {
                    p.coords.forEach(coord => {
                        const cell = document.querySelector(`[data-row="${coord.r}"][data-col="${coord.c}"]`);
                        if (cell) cell.classList.add('revealed-missed');
                    });
                    document.getElementById(`pill-${p.word}`)?.classList.add('word-found');
                    foundWords.add(p.word);
                }
            });
            updateUI();
            setTimeout(() => showWin(false), 800);
        }

        function showWin(isNatural) {
            document.getElementById('modal-title').textContent = isNatural ? "CLEARED!" : "ANSWERS REVEALED";
            document.getElementById('modal-text').textContent = isNatural ? "Fantastic eye for detail!" : "Here were the words you missed. Keep practicing!";
            document.getElementById('modal-icon').textContent = isNatural ? "✨" : "💡";
            document.getElementById('share-btn').style.display = isNatural ? 'flex' : 'none';
            modal.classList.remove('hidden');
        }

        function shareToWhatsApp() {
            const dateStr = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
            const diffText = difficulty.toUpperCase();
            let emojiGrid = "";
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const cell = document.querySelector(`[data-row="${r}"][data-col="${c}"]`);
                    emojiGrid += cell.classList.contains('found') ? "🟩" : "⬜";
                }
                emojiGrid += "%0A";
            }
            const text = `🧩 WordPop Pro%0A📅 ${dateStr}%0A🔥 Difficulty: ${diffText}%0A✅ Words Found: ${foundWords.size}/${words.length}%0A%0A${emojiGrid}%0ACan you beat my score?`;
            window.open(`https://wa.me/?text=${text}`, '_blank');
        }

        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchend', handleEnd);
        document.getElementById('next-level-btn').onclick = initGame;
        document.getElementById('share-btn').onclick = shareToWhatsApp;
        window.onload = initGame;
    </script>
</body>
</html>
